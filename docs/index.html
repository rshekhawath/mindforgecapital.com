<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="300">
<title>Scheduled maintenance — MindForge Capital</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;
    color:#0c1831;background:#f0f5ff;display:flex;align-items:center;justify-content:center;
    padding:24px;line-height:1.6;position:relative;overflow:hidden;
  }
  body::before{content:'';position:fixed;inset:-10%;z-index:0;pointer-events:none;
    background:radial-gradient(520px 520px at 84% 8%,rgba(45,212,191,.16) 0%,transparent 70%),
               radial-gradient(460px 460px at 6% 92%,rgba(37,99,235,.14) 0%,transparent 70%);}
  .card{position:relative;z-index:1;max-width:520px;width:100%;text-align:center;
    background:#fff;border:1px solid rgba(37,99,235,.14);border-radius:24px;
    padding:48px 40px;box-shadow:0 1px 2px rgba(12,24,49,.04),0 30px 70px -34px rgba(26,80,216,.30);}
  .mark{display:flex;align-items:center;justify-content:center;gap:11px;margin-bottom:20px}
  .mark svg{display:block}
  .mark b{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
    font-size:19px;font-weight:800;letter-spacing:-.02em;color:#0c1831}
  .pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:#1a50d8;background:rgba(37,99,235,.08);padding:5px 12px;border-radius:999px;margin-bottom:18px}
  h1{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
    font-size:clamp(26px,5vw,34px);font-weight:800;letter-spacing:-.02em;color:#0c1831;margin-bottom:14px;line-height:1.15}
  p{font-size:16px;color:#1e3a5f;font-weight:300;max-width:400px;margin:0 auto}
  .foot{margin-top:28px;font-size:13px;color:#475569}
  .foot a{color:#1a50d8;font-weight:600;text-decoration:none}
  .foot a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="11" fill="#1a50d8"/>
        <path d="M6 16V8l6 5 6-5v8" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <b>MindForge Capital</b>
    </div>
    <span class="pill">Scheduled maintenance</span>
    <h1>We'll be back shortly.</h1>
    <p>We're rolling out improvements to the platform. The site will be back online in a little while — thanks for your patience.</p>
    <div class="foot">Questions? <a href="mailto:support@mindforgecapital.com">support@mindforgecapital.com</a></div>
  </div>
</body>
</html>
