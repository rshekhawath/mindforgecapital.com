<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- V11.4 security hardening (additive): restrict resource origins to self + the Apps Script backend, block plugins & base-tag injection, refuse cross-origin framing -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://script.google.com https://*.googleusercontent.com; form-action 'self' https://script.google.com; frame-src 'none'; media-src 'none'; frame-ancestors 'none'; worker-src 'self'; manifest-src 'self'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=(), browsing-topics=(), serial=(), bluetooth=(), hid=(), midi=(), idle-detection=(), display-capture=(), autoplay=(), screen-wake-lock=(), xr-spatial-tracking=()">
<script>/* V11.4 clickjacking guard: refuse cross-origin framing */(function(){try{if(window.self===window.top)return;var s=false;try{s=window.top.location.origin===window.location.origin;}catch(e){s=false;}if(!s){try{window.top.location.replace(window.location.href);}catch(e){document.documentElement.style.visibility="hidden";}}}catch(e){}})();</script>
<!-- V11.4 premium PWA/install metadata: consistent, installable, light-rendered -->
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#1a50d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MindForge Capital">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>Scanner — MindForge Capital</title>
<meta name="description" content="Scanner — quantitative equity screening across the full NSE universe.">
<!-- V19.5: /scanner/ is the branded name; the live page lives at /screener/. This
     shim redirects the branded URL so /scanner/ no longer 404s. -->
<link rel="canonical" href="https://mindforgecapital.com/screener/">
<meta name="robots" content="noindex, follow">
<meta http-equiv="refresh" content="0; url=/screener/">
<link rel="icon" href="/assets/favicon-32.png" type="image/png">
<script>location.replace("/screener/" + location.search + location.hash);</script>
<style>
  html,body{height:100%;margin:0}
  body{background:#f0f5ff;color:#1e3a5f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;display:flex;align-items:center;justify-content:center}
  .box{text-align:center}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(37,99,235,.20);border-top-color:#1a50d8;margin:0 auto 14px;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#1a50d8;font-weight:600}
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Opening the Scanner… <a href="/screener/">click here</a> if you are not redirected.</p>
  </div>
</body>
</html>
